name: Full test suite

# The full suite downloads HuggingFace embedding + reranker models (~14 min) and,
# if an LLM_API_KEY secret is configured, exercises the live OpenRouter / Crossref
# paths. It is intentionally kept off the per-PR path and run on demand or nightly.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  full:
    name: Full suite (slow + optional live LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev --extra webapp

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('scholarmind/config.py') }}
          restore-keys: |
            hf-${{ runner.os }}-

      # LLM_API_KEY is read from the repo secret. When it is unset, the llm-marked
      # tests skip cleanly (skipif on the key), so this job is green with or without
      # a configured key.
      - name: Full tests
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: uv run pytest -q
